<body>
  <header class="topbar"><div class="topbar-inner"><div class="brand"><span class="brand-mark">渝</span><span>重庆楼市选题日报</span></div><div class="top-actions"><button class="tool-btn" id="shareCopyBtn" aria-label="复制日报转发文案">复制今日选题</button><button class="tool-btn icon-only" id="themeBtn" aria-label="切换深色模式">◐</button><button class="tool-btn print-tool" onclick="window.print()" aria-label="打印日报">↗ <span class="print-label">打印</span></button></div></div></header>

    <main>
      <section class="hero"><div class="hero-visual"><img class="hero-cover" src="assets/chongqing-city-banner-title-designed.png" alt="重庆楼市选题日报横版主视觉"></div><div class="hero-meta"><span class="pill" id="issue"></span><span class="pill good" id="dailyTip"></span><span class="pill" id="dailyCount"></span></div><div class="signals"><div class="signals-head"><span class="signals-kicker">今日三条重点</span><span class="signals-note">全国 · 重庆房产 · 重庆本地</span></div><div class="signal-list" id="signalList"></div></div></section>
      <section class="section" id="news"><div class="section-head"><div class="section-heading"><span class="section-no">01</span><div><h2>资讯速递</h2><div class="section-sub">全国 / 重庆 / 本地热点 · 先看变化再决定说什么</div></div></div><button class="collapse">收起 −</button></div><div class="section-body"><div class="control-row"><div class="segmented" role="tablist" aria-label="资讯时间范围"><button class="active" data-period="day">今日</button><button data-period="week">本周</button><button data-period="month">本月</button></div><div class="switch-wrap"><span class="switch-label">原文截图</span><button class="switch" id="shotSwitch" role="switch" aria-checked="false" aria-label="显示原文截图"></button></div></div><div id="newsGroups"></div></div></section>
      <section class="section" id="district"><div class="section-head"><div class="section-heading"><span class="section-no">02</span><div><h2>区域聚焦</h2><div class="section-sub">主城 8 区全覆盖 · 动态与选题方向</div></div></div><button class="collapse">收起 −</button></div><div class="section-body"><div class="district-tabs" id="districtTabs"></div><div id="districtPanel"></div></div></section>

  <div class="toast" role="status" aria-live="polite">标题已复制</div>
  <script src="report-data.js"></script>
  <script>
    const report=window.REPORT_DATA;if(!report)throw new Error('日报数据未生成，请先运行本地构建');
    const {meta,news,districts,knowledge,topics,viral,ideas,history=[]}=report;
    const $=s=>document.querySelector(s);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const hasViralData=v=>Boolean(v?.verified&&v.source_url&&v.metrics&&['likes','favorites','comments'].every(key=>Number.isInteger(v.metrics[key])&&v.metrics[key]>=0));const showViral=hasViralData(viral);if(!showViral){$('#viral').hidden=true;$('.rail a[href="#viral"]')?.remove();$('#ideas .section-no').textContent='04';$('#knowledge .section-no').textContent='05';$('#historyNo').textContent='06'}if(!history.length){$('#history').hidden=true;$('.rail a[href="#history"]')?.remove()}
    function chineseDate(value){const [y,m,d]=String(value).split('-').map(Number),week='日一二三四五六';return `${m}月${d}日 · 星期${week[new Date(y,m-1,d).getDay()]}`}
    document.title=`山城选题日报 · ${meta.display_date}`;$('#sideDate').textContent=chineseDate(meta.date);$('#editionNote').textContent=`● ${meta.edition}`;$('#sourceNote').textContent=meta.source_note;$('#verifiedAt').textContent=`最后生成 ${meta.updated_at}`;$('#issue').textContent=`${chineseDate(meta.date)} · 第 ${meta.issue} 期`;$('#dailyTip').textContent=meta.daily_tip;$('#dailyCount').textContent=`${news.day.length} 条资讯 · ${districts.length} 区 · ${topics.length} 个选题角度`;$('#footerStatus').textContent=`${meta.edition} · ${meta.updated_at} 生成`;
    function sourceLink(x){return x.source_url?`<a class="source" href="${esc(x.source_url)}" target="_blank" rel="noopener">↗ 来源：${esc(x.source)}</a>`:`<span class="source disabled">来源：${esc(x.source||'待补充')}</span>`}
    function categoryOf(n){if(n.category)return n.category;const cls=n.tags?.[0]?.[1];return cls==='policy'?'全国房产':cls==='market'?'重庆房产':'重庆本地热点'}
    function renderSignals(){const labels=[['全国房产','全国'],['重庆房产','重庆房产'],['重庆本地热点','重庆本地']];const items=labels.map(([category,label])=>({label,item:(news.day||[]).find(n=>categoryOf(n)===category)})).filter(x=>x.item);$('#signalList').innerHTML=items.map(({label,item})=>`<article class="signal"><span class="signal-category">${esc(label)}</span><span class="signal-title">${esc(item.title)}</span></article>`).join('')}
    function buildShareCopy(){const labels=['全国房产','重庆房产','重庆本地热点','贝壳重庆楼市周报'];const highlights=labels.map(label=>(news.day||[]).find(item=>categoryOf(item)===label)).filter(Boolean);const remaining=Math.max(0,(news.day||[]).length-highlights.length);const numbers=['①','②','③','④'];const lines=[`【重庆楼市选题日报｜${meta.display_date}】`,'热点资讯',...highlights.map((item,i)=>`${numbers[i]||`${i+1}.`} ${item.title}`)];if(remaining)lines.push(`另有${remaining}条已核验资讯，点击日报查看。`);lines.push('固定栏目：资讯要点｜8区动态｜选题角度｜购房百科｜灵感补给');if(/^https?:$/.test(location.protocol))lines.push(location.href);else lines.push('【粘贴日报链接】');return lines.join('\n')}
    function matchedTopic(item){return topics.find(t=>t.source_url&&t.source_url===item.source_url)||topics.find(t=>t.source_headline===item.title)}
    function topicBrief(angle,reference){if(!angle&&!reference)return'';return `<div class="topic-brief">${angle?`<div><b>选题角度</b>${esc(angle)}</div>`:''}${reference?`<div><b>选题参考</b>${esc(reference)}</div>`:''}</div>`}
    function topicReference(topic){return (topic?.titles||[]).filter(x=>x&&x!==topic.title).slice(0,2).join(' / ')||topic?.core_judgment||''}
    function newsTopicBrief(item){return topicBrief(item.topic_angle,item.topic_reference)}
    function renderNews(period='day'){const labels=[['全国房产','全国房产'],['重庆房产','重庆房产'],['重庆本地热点','重庆本地'],['贝壳重庆楼市周报','贝壳重庆楼市周报']];const items=news[period]||[];const groups=period==='day'?labels.map(([category,label])=>[label,items.filter(n=>categoryOf(n)===category)]):[[period==='week'?'本周重点':'本月回顾',items]];$('#newsGroups').innerHTML=groups.map(([label,list])=>`<div class="news-group"><div class="group-head">${esc(label)} <span class="group-count">${list.length} 条</span></div><div class="news-grid">${list.length?list.map(n=>`<article class="news-card"><div class="card-meta"><div class="tags">${(n.tags||[]).map(t=>`<span class="tag ${esc(t[1])}">${esc(t[0])}</span>`).join('')}${n.verified?'':'<span class="pending">待核验</span>'}</div><span class="heat">${esc(n.hot)}</span></div><h3>${esc(n.title)}</h3><div class="time">${esc(n.time)}</div><div class="angle"><b>要点总结</b><br>${esc(n.angle)}</div>${newsTopicBrief(n)}${sourceLink(n)}<div class="shot">${n.screenshot_url?`<a href="${esc(n.screenshot_url)}" target="_blank" rel="noopener">查看原文截图 →</a>`:'本条尚未配置原文截图'}</div></article>`).join(''):'<div class="news-card"><span class="source disabled">今日暂无已录入内容</span></div>'}</div></div>`).join('')}
    function renderDistrict(i=0){const d=districts[i];[...$('#districtTabs').children].forEach((b,n)=>b.classList.toggle('active',n===i));const cards=(d.items||[]).map(item=>{const topic=matchedTopic(item),angles=item.topics||[];return `<article class="district-card"><h4>${esc(item.title)}</h4><div class="district-event">${esc(item.summary)}</div>${topicBrief(topic?.title||angles[0],topicReference(topic)||angles[1])}<div class="district-source"><span>${esc(item.source||'待补充')}</span>${item.source_url?`<a class="source" href="${esc(item.source_url)}" target="_blank" rel="noopener">查看原文 →</a>`:''}</div></article>`}).join('');$('#districtPanel').innerHTML=`<div class="district-head"><h3>${esc(d.name)}</h3><div class="heat">热度 ${esc(d.heat||'●●○')}</div></div><div class="district-grid">${cards}</div>`}
    function renderKnowledge(){$('#knowledgeList').innerHTML=knowledge.map(k=>`<article class="knowledge-card"><button class="save" data-save="${esc(k.id)}" aria-label="收藏知识卡">♡</button><span class="tag ${esc(k.tag_class)}">${esc(k.category)}</span><h3>${esc(k.title)}</h3><ul class="points">${k.points.map(p=>`<li>${esc(p)}</li>`).join('')}</ul><div class="agent-tip">购房提醒：${esc(k.tip)}</div><textarea class="notes" data-note="${esc(k.id)}" placeholder="我的学习笔记…" aria-label="${esc(k.title)}学习笔记"></textarea><div style="margin-top:8px">${sourceLink(k)}</div></article>`).join('')}
    function renderViral(){const capture=viral.captured_at?` · 数据采集 ${new Date(viral.captured_at).toLocaleString('zh-CN',{hour12:false})}`:'';const author=viral.author?` · @${viral.author}`:'';$('#viralPanel').innerHTML=`<article class="viral-card"><div class="viral-stats"><div class="viral-platform">${esc(viral.platform)}${esc(author)} · ${esc(viral.publish_time)}</div><h3>${esc(viral.title)}</h3><div class="stats">${(viral.stats||[]).map(x=>`<span>${esc(x)}</span>`).join('')}</div></div><div class="viral-formula"><label>FORMULA / 可复用公式</label><h4>${esc(viral.formula)}</h4><p>${esc(viral.description)}</p>${viral.verified&&viral.source_url?`<a class="verified" href="${esc(viral.source_url)}" target="_blank" rel="noopener">● 来源已核验${esc(capture)} · 查看原内容 →</a>`:'<span class="verified">○ 暂无已核验案例，不展示虚构数据</span>'}</div></article>`}
    function renderIdeas(){$('#ideasList').innerHTML=ideas.map(x=>`<div class="idea"><span class="idea-type">${esc(x.type)}</span><span class="idea-body">${esc(x.body)}</span><span class="idea-source">${esc(x.source)}</span></div>`).join('')}
    function siteRootUrl(){const url=new URL(location.href);if(url.protocol==='file:'&&url.pathname.includes('/output/standalone/'))return new URL('../../',url);const marker='/archive/';const position=url.pathname.indexOf(marker);if(position>=0){url.pathname=url.pathname.slice(0,position+1);url.search='';url.hash='';return url}return new URL('./',url)}
    function historyHref(path){try{return new URL(path).href}catch{return new URL(path,siteRootUrl()).href}}
    function renderHistory(){if(!history.length)return;$('#historyList').innerHTML=history.map(item=>`<a class="history-item" href="${esc(historyHref(item.path))}"><span class="history-meta">第 ${esc(item.issue||'—')} 期<br>${esc(item.display_date)}</span><span class="history-title">${esc(item.title)}</span><span class="history-arrow">↗</span></a>`).join('')}
    $('#districtTabs').innerHTML=districts.map((d,i)=>`<button class="${i===0?'active':''}" data-i="${i}">${esc(d.name)}</button>`).join('');renderSignals();renderNews();renderDistrict();renderKnowledge();if(showViral)renderViral();renderIdeas();renderHistory();$('#shareCopyBtn').dataset.copy=buildShareCopy();$('#shareCopyBtn').dataset.toast='今日选题已复制';
    function showToast(message='标题已复制'){const t=$('.toast');t.textContent=message;t.classList.add('show');clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>t.classList.remove('show'),1600)}
    $('.rail nav').addEventListener('click',e=>{const link=e.target.closest('a[href^="#"]');if(!link)return;const target=$(link.getAttribute('href'));if(!target)return;e.preventDefault();target.scrollIntoView()});
    document.addEventListener('click',e=>{const copy=e.target.closest('[data-copy]');if(copy){navigator.clipboard?.writeText(copy.dataset.copy);showToast(copy.dataset.toast)}const period=e.target.closest('[data-period]');if(period){document.querySelectorAll('[data-period]').forEach(x=>x.classList.remove('active'));period.classList.add('active');renderNews(period.dataset.period)}const dist=e.target.closest('#districtTabs button');if(dist)renderDistrict(+dist.dataset.i);const heading=e.target.closest('.section-heading');const col=e.target.closest('.collapse');if(heading||col){const section=(heading||col).closest('.section');section.classList.toggle('collapsed');section.querySelector('.collapse').textContent=section.classList.contains('collapsed')?'展开 +':'收起 −';localStorage.setItem('collapsed-'+section.id,section.classList.contains('collapsed'))}const save=e.target.closest('.save');if(save){save.classList.toggle('saved');save.textContent=save.classList.contains('saved')?'♥':'♡';localStorage.setItem('saved-'+save.dataset.save,save.classList.contains('saved'))}});
    $('#shotSwitch').onclick=e=>{const on=e.currentTarget.classList.toggle('on');e.currentTarget.setAttribute('aria-checked',on);$('#newsGroups').classList.toggle('show-shots',on)};
    document.querySelectorAll('.notes').forEach(n=>{n.value=localStorage.getItem('note-'+n.dataset.note)||'';n.addEventListener('input',()=>localStorage.setItem('note-'+n.dataset.note,n.value))});document.querySelectorAll('.save').forEach(s=>{if(localStorage.getItem('saved-'+s.dataset.save)==='true'){s.classList.add('saved');s.textContent='♥'}});document.querySelectorAll('.section').forEach(s=>{if(localStorage.getItem('collapsed-'+s.id)==='true'){s.classList.add('collapsed');s.querySelector('.collapse').textContent='展开 +'}});
    const root=document.documentElement,themeBtn=$('#themeBtn'),storedTheme=localStorage.getItem('theme'),systemDark=matchMedia('(prefers-color-scheme:dark)').matches;root.dataset.theme=storedTheme||(systemDark?'dark':'light');themeBtn.onclick=()=>{const next=root.dataset.theme==='dark'?'light':'dark';root.dataset.theme=next;localStorage.setItem('theme',next)};
    const links=[...document.querySelectorAll('.rail nav a')];const observer=new IntersectionObserver(entries=>entries.forEach(x=>{if(x.isIntersecting)links.forEach(a=>a.classList.toggle('active',a.hash==='#'+x.target.id))}),{rootMargin:'-20% 0px -65%'});document.querySelectorAll('.section').forEach(s=>observer.observe(s));
    addEventListener('scroll',()=>{const max=document.documentElement.scrollHeight-innerHeight;$('#progressFill').style.height=(max?scrollY/max*100:0)+'%'},{passive:true});
  </script>
